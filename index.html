<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Badlav Chai Point</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #fffaf5;
}

/* 🔥 NAVBAR */
nav {
    display: flex;
    justify-content: space-between;
    padding: 15px 40px;
    background: rgba(62,39,35,0.95);
    color: white;
    position: sticky;
    top: 0;
    z-index: 1000;
}

nav h1 {
    margin: 0;
    font-weight: 800;
}

nav a {
    color: white;
    margin-left: 20px;
    text-decoration: none;
    font-weight: 600;
}

nav a:hover {
    color: #d4a373;
}

/* 🔥 HERO */
#home {
    text-align: center;
    padding: 100px 20px;
    background: linear-gradient(to right, #6b3e26, #d4a373);
    color: white;
}

h2 {
    font-size: 50px;
    font-weight: 800;
    text-shadow: 0 10px 25px rgba(0,0,0,0.3);
    animation: float 3s ease-in-out infinite;
}

.chai {
    display: inline-block;
    animation: bounce 2s infinite;
}

@keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

@keyframes bounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
}

button {
    margin-top: 20px;
    padding: 12px 30px;
    border-radius: 30px;
    border: none;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
}

/* 🔥 MENU */
#menu {
    padding: 60px 20px;
    text-align: center;
}

.menu-box {
    display: inline-block;
    background: white;
    padding: 20px;
    margin: 10px;
    border-radius: 15px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.1);
}

/* 🔥 GALLERY */
#gallery {
    padding: 60px;
    text-align: center;
}

#gallery img {
    width: 250px;
    border-radius: 15px;
    margin: 10px;
}

/* 🔥 CONTACT */
#contact {
    padding: 60px;
    text-align: center;
}

/* 🔥 WHATSAPP BUTTON */
.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: green;
    color: white;
    padding: 15px;
    border-radius: 50%;
    font-size: 20px;
    text-decoration: none;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
    <h1>Badlav Chai ☕</h1>
    <div>
        <a href="#home">Home</a>
        <a href="#menu">Menu</a>
        <a href="#gallery">Gallery</a>
        <a href="#contact">Contact</a>
    </div>
</nav>

<!-- HERO -->
<section id="home">
    <h2>Badlav Chai Point <span class="chai">☕</span></h2>
    <p>Ek cup chai, aur zindagi me badlav!</p>
    <button onclick="alert('Visit us in Bharatpur!')">Visit Now</button>
</section>

<!-- MENU -->
<section id="menu">
    <h2>Our Menu</h2>
    <div class="menu-box">Masala Chai ₹10</div>
    <div class="menu-box">Adrak Chai ₹12</div>
    <div class="menu-box">Elaichi Chai ₹15</div>
    <div class="menu-box">Bun Maska ₹20</div>
</section>

<!-- GALLERY -->
<section id="gallery">
    <h2>Our Vibe</h2>
    <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93">
    <img src="https://images.unsplash.com/photo-1511920170033-f8396924c348">
</section>

<!-- CONTACT -->
<section id="contact">
    <h2>Contact Us</h2>
    <p>Bharatpur, Rajasthan</p>
    <p>📞 +91 6376130055</p>
</section>

<!-- WHATSAPP -->
<a class="whatsapp" href="https://wa.me/916376130055">💬</a>

</body>
</html>
