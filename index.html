<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Badlav Chai Point</title>

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
        }

        /* 🔥 NAVBAR */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: #3e2723;
            color: white;
        }

        nav h1 {
            margin: 0;
            font-size: 22px;
            letter-spacing: 1px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-weight: bold;
        }

        nav a:hover {
            color: #d4a373;
        }

        /* 🔥 HERO SECTION */
        #home {
            text-align: center;
            padding: 80px 20px;
            background: linear-gradient(to right, #6b3e26, #d4a373);
            color: white;
        }

        /* ✨ PREMIUM TEXT */
        h2 {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: 2px;
            text-shadow: 
                0 5px 15px rgba(0,0,0,0.3),
                0 0 20px rgba(255,255,255,0.2);
            animation: float 3s ease-in-out infinite;
        }

        /* ☕ EMOJI STYLE */
        .chai {
            font-size: 50px;
            display: inline-block;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        p {
            font-size: 18px;
            margin-top: 10px;
        }

        button {
            margin-top: 20px;
            padding: 12px 25px;
            border: none;
            background: white;
            color: #6b3e26;
            font-weight: bold;
            cursor: pointer;
            border-radius: 30px;
            font-size: 16px;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.1);
            background: #3e2723;
            color: white;
        }
    </style>
</head>

<body>

<!-- 🔥 NAVBAR -->
<nav>
    <h1>Badlav Chai ☕</h1>
    <div>
        <a href="#">Home</a>
        <a href="#">Menu</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </div>
</nav>

<!-- 🔥 HERO -->
<section id="home">
    <h2>
        Welcome to Badlav Chai Point 
        <span class="chai">☕</span>
    </h2>
    <p>Ek cup chai, aur zindagi me badlav!</p>
    <button onclick="alert('Visit us in Bharatpur!')">Visit Now</button>
</section>

</body>
</html>
