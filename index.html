<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Badlav Chai Point</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #fffaf5;
}

/* 🔥 NAVBAR */
nav {
    display: flex;
    justify-content: space-between;
    padding: 12px 20px;
    background: #3e2723;
    color: white;
    position: sticky;
    top: 0;
    z-index: 1000;
}

nav a {
    color: white;
    margin-left: 10px;
    text-decoration: none;
    font-size: 14px;
}

/* 🔥 HERO */
#home {
    text-align: center;
    padding: 70px 20px;
    background: linear-gradient(to right, #6b3e26, #d4a373);
    color: white;
}

h2 {
    font-size: 32px;
}

/* 🔥 MENU GRID (ZOMATO STYLE) */
#menu {
    padding: 30px 15px;
}

.menu-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 15px;
}

.menu-card {
    background: white;
    border-radius: 12px;
    padding: 15px;
    text-align: center;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.menu-card:hover {
    transform: translateY(-5px);
}

.menu-card h3 {
    margin: 5px 0;
    font-size: 14px;
}

.price {
    color: #6b3e26;
    font-weight: bold;
}

/* 🔥 GALLERY */
#gallery {
    padding: 30px;
    text-align: center;
}

#gallery img {
    width: 100%;
    max-width: 300px;
    border-radius: 10px;
    margin: 10px 0;
}

/* 🔥 CONTACT */
#contact {
    text-align: center;
    padding: 30px;
}

/* 🔥 MAP */
#map {
    text-align: center;
    padding: 20px;
}

/* 🔥 FLOAT BUTTONS */
.whatsapp, .direction {
    position: fixed;
    right: 15px;
    width: 45px;
    height: 45px;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    color: white;
    text-decoration: none;
}

.whatsapp {
    bottom: 15px;
    background: #25D366;
}

.direction {
    bottom: 70px;
    background: #6b3e26;
}

/* 📱 MOBILE IMPROVEMENTS */
@media(max-width:600px){
    nav {
        flex-direction: column;
        align-items: center;
    }

    h2 {
        font-size: 26px;
    }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
    <h3>Badlav Chai ☕</h3>
    <div>
        <a href="#home">Home</a>
        <a href="#menu">Menu</a>
        <a href="#contact">Contact</a>
    </div>
</nav>

<!-- HERO -->
<section id="home">
    <h2>Badlav Chai Point ☕</h2>
    <p>Ek cup chai, aur zindagi me badlav!</p>
</section>

<!-- MENU -->
<section id="menu">
    <h2>Menu</h2>

    <div class="menu-grid">
        <div class="menu-card"><h3>Masala Chai</h3><p class="price">₹10</p></div>
        <div class="menu-card"><h3>Adrak Chai</h3><p class="price">₹12</p></div>
        <div class="menu-card"><h3>Elaichi Chai</h3><p class="price">₹15</p></div>
        <div class="menu-card"><h3>Maggi</h3><p class="price">₹40</p></div>
        <div class="menu-card"><h3>Cheese Maggi</h3><p class="price">₹70</p></div>
        <div class="menu-card"><h3>Pizza</h3><p class="price">₹119</p></div>
    </div>
</section>

<!-- GALLERY -->
<section id="gallery">
    <h2>Our Vibe</h2>
    <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93">
</section>

<!-- CONTACT -->
<section id="contact">
    <h2>Contact</h2>
    <p>📍 Bharatpur, Rajasthan</p>
    <p>📞 +91 6376130055</p>
</section>

<!-- MAP -->
<section id="map">
    <iframe 
        src="https://www.google.com/maps/embed?pb=...."
        width="100%" 
        height="250"
        style="border:0; border-radius:10px;">
    </iframe>
</section>

<!-- FLOAT BUTTONS -->
<a href="https://wa.me/916376130055" class="whatsapp">💬</a>
<a href="https://www.google.com/maps/dir/?api=1&destination=Badlav+Chai+Point+Bharatpur" class="direction">📍</a>

</body>
</html>
