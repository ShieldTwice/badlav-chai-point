<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Badlav Chai Point</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
        }

        #home {
            text-align: center;
            padding: 50px;
            background: linear-gradient(to right, #6b3e26, #d4a373);
            color: white;
        }

        button {
            padding: 10px 20px;
            border: none;
            background: white;
            color: #6b3e26;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
        }

        /* 👇 3D FLOATING TEXT */
        h2 {
            font-size: 40px;
            font-weight: bold;
            text-shadow: 
                2px 2px 0 #6b3e26,
                4px 4px 0 #5a3220,
                6px 6px 10px rgba(0,0,0,0.3);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        button:hover {
            transform: scale(1.1);
            transition: 0.3s;
        }
    </style>

</head>

<body>

<section id="home">
    <h2>Welcome to Badlav Chai Point ☕</h2>
    <p>Ek cup chai, aur zindagi me badlav!</p>
    <button onclick="alert('Visit us in Bharatpur!')">Visit Now</button>
</section>

</body>
</html>
